<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c0f;--bg2:#111418;--bg3:#181c22;--border:#252a32;--green:#22c55e;--green-dim:#15803d;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;--text:#e2e8f0;--muted:#64748b;--radius:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:100}

  /* Login */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 44px 40px;width:360px;position:relative;overflow:hidden}
  .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
  .login-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
  .login-logo span{color:var(--green)}
  .login-sub{color:var(--muted);font-size:13px;font-family:'Space Mono',monospace;margin-bottom:36px}
  .error-msg{color:var(--red);font-size:13px;font-family:'Space Mono',monospace;margin-top:-12px;margin-bottom:16px;display:none}

  /* Global */
  label{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  input[type="text"],input[type="password"]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;margin-bottom:20px}
  input:focus{border-color:var(--green)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:11px 22px;transition:opacity .15s,transform .1s;letter-spacing:.03em}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-full{width:100%}
  .btn-green{background:var(--green);color:#fff}
  .btn-red{background:var(--red);color:#fff}
  .btn-amber{background:var(--amber);color:#000}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-muted{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
  .btn-small{padding:6px 14px;font-size:13px}

  /* Header */
  .app-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--border);width:100%}
  .app-logo{font-size:22px;font-weight:800;letter-spacing:-1px}
  .app-logo span{color:var(--green)}
  .user-badge{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);font-family:'Space Mono',monospace}

  /* Screens */
  #servers-screen,#panel-screen,#admin-screen{display:none;flex-direction:column;width:100%;max-width:900px;padding:32px 24px;gap:24px}

  /* Grille serveurs */
  .servers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:8px}
  .server-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
  .server-card:hover{border-color:var(--green);transform:translateY(-2px)}
  .server-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0;transition:opacity .2s}
  .server-card:hover::before{opacity:1}
  .server-icon{font-size:36px;margin-bottom:12px}
  .server-name{font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
  .server-desc{font-size:13px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:16px}
  .server-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:'Space Mono',monospace;padding:4px 10px;border-radius:20px;font-weight:700}
  .server-badge.running{background:rgba(34,197,94,.15);color:var(--green)}
  .server-badge.stopped{background:rgba(100,116,139,.15);color:var(--muted)}
  .server-badge.starting,.server-badge.restarting,.server-badge.fixing{background:rgba(245,158,11,.15);color:var(--amber)}
  .server-badge.stopping{background:rgba(239,68,68,.15);color:var(--red)}
  .server-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* Panel serveur */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
  .status-row{display:flex;align-items:center;gap:20px;margin-bottom:28px}
  .status-dot{width:14px;height:14px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .4s}
  .status-dot.running{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
  .status-dot.starting,.status-dot.restarting,.status-dot.fixing{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:pulse 1s infinite}
  .status-dot.stopping{background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .status-label{font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .status-meta{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:2px}
  .server-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);margin-bottom:24px;display:flex;gap:24px;flex-wrap:wrap}
  .server-info span{color:var(--text)}
  .action-row{display:flex;gap:10px;flex-wrap:wrap}
  .console-box{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:'Space Mono',monospace;font-size:12px;color:#a0aec0;height:280px;overflow-y:auto;line-height:1.6}
  .console-line.warn{color:var(--amber)}
  .console-line.error{color:var(--red)}
  .console-line.info{color:var(--green)}

  /* Plugins */
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:16px}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--purple)}
  .upload-zone p{color:var(--muted);font-size:14px;margin-top:8px}
  .plugin-list{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .plugin-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-family:'Space Mono',monospace;font-size:13px}
  .plugin-name{flex:1;color:var(--text)}
  .plugin-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(168,85,247,.2);color:var(--purple)}
  .plugin-status.done{background:rgba(34,197,94,.15);color:var(--green)}

  /* Admin */
  .create-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin-bottom:20px}
  .create-form input{margin-bottom:0}
  .field{display:flex;flex-direction:column;gap:6px}
  .perm-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius)}
  .perm-row label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:0}
  .perm-row input[type="checkbox"]{width:14px;height:14px;accent-color:var(--green);margin:0;cursor:pointer}
  .user-list{display:flex;flex-direction:column;gap:10px}
  .user-row{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .user-row-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
  .user-info{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:13px}
  .user-actions{display:flex;gap:8px;align-items:center}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:4px;background:var(--green-dim);color:var(--green)}
  .badge.admin{background:rgba(59,130,246,.2);color:var(--blue)}
  .perm-panel{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .perm-toggle{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;user-select:none}
  .perm-toggle input[type="checkbox"]{width:14px;height:14px;accent-color:var(--green);margin:0;cursor:pointer}
  .perm-toggle.active{color:var(--text)}
  .perm-save-btn{margin-left:auto}
  .nav-btn{background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0}
  .nav-btn:hover{color:var(--text)}

  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 22px;font-family:'Space Mono',monospace;font-size:13px;transition:transform .3s ease;z-index:200}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.ok{border-color:var(--green);color:var(--green)}
  #toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">MC<span>Panel</span></div>
    <div class="login-sub">// accès restreint</div>
    <label>Nom d'utilisateur</label>
    <input type="text" id="login-user" placeholder="username">
    <label>Mot de passe</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <div class="error-msg" id="login-error">Identifiants incorrects.</div>
    <button class="btn btn-green btn-full" onclick="login()">Connexion</button>
  </div>
</div>

<!-- Liste des serveurs -->
<div id="servers-screen">
  <div class="app-header">
    <div class="app-logo">MC<span>Panel</span></div>
    <div class="user-badge">
      <span id="header-user-s"></span>
      <button class="btn btn-muted btn-small" id="btn-admin-s" onclick="showAdmin()" style="display:none">⚙️ Admin</button>
      <button class="btn btn-muted btn-small" onclick="logout()">Déconnexion</button>
    </div>
  </div>
  <div>
    <div style="font-size:20px;font-weight:800;margin-bottom:6px">Tes serveurs</div>
    <div style="color:var(--muted);font-family:'Space Mono',monospace;font-size:13px">Clique sur un serveur pour le gérer</div>
  </div>
  <div class="servers-grid" id="servers-grid"></div>
</div>

<!-- Panel d'un serveur -->
<div id="panel-screen">
  <div class="app-header">
    <div class="app-logo">MC<span>Panel</span></div>
    <div class="user-badge">
      <button class="nav-btn" onclick="showServers()">← Retour</button>
      <span id="header-user-p"></span>
      <button class="btn btn-muted btn-small" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="panel-server-name">Serveur</div>
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <div>
        <div class="status-label" id="status-label">Chargement…</div>
        <div class="status-meta" id="status-meta"></div>
      </div>
    </div>
    <div class="server-info" id="server-info"></div>
    <div class="action-row">
      <button class="btn btn-green"  id="btn-start"   onclick="serverAction('start')"   disabled>▶ Démarrer</button>
      <button class="btn btn-red"    id="btn-stop"    onclick="serverAction('stop')"    disabled>■ Arrêter</button>
      <button class="btn btn-blue"   id="btn-restart" onclick="serverAction('restart')" disabled>↺ Restart</button>
      <button class="btn btn-amber"  id="btn-fix"     onclick="serverAction('fix')"              >🔧 Fix</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Console</div>
    <div class="console-box" id="console-box">
      <div class="console-line info">// En attente des logs...</div>
    </div>
  </div>

  <div class="card" id="plugins-card" style="display:none">
    <div class="card-title">Plugins</div>
    <div class="upload-zone" onclick="document.getElementById('plugin-input').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div style="font-size:32px">📦</div>
      <p>Glisse un fichier <strong>.jar</strong> ici ou clique pour sélectionner</p>
    </div>
    <input type="file" id="plugin-input" accept=".jar" style="display:none" onchange="uploadPlugin(this.files[0])">
    <div class="plugin-list" id="plugin-list"></div>
  </div>
</div>

<!-- Admin -->
<div id="admin-screen">
  <div class="app-header">
    <div class="app-logo">MC<span>Panel</span></div>
    <div class="user-badge">
      <button class="nav-btn" onclick="showServers()">← Retour</button>
      <button class="btn btn-muted btn-small" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Créer un compte</div>
    <div class="create-form">
      <div class="field"><label>Nom</label><input type="text" id="new-user" placeholder="joueur123"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="new-pass" placeholder="••••••"></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-green btn-small" onclick="createUser()">+ Créer</button></div>
    </div>
    <div class="perm-row" style="margin-bottom:20px">
      <span style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-right:8px">Permissions :</span>
      <label><input type="checkbox" id="np-admin"> Admin</label>
      <label><input type="checkbox" id="np-start"> Démarrer</label>
      <label><input type="checkbox" id="np-stop"> Arrêter</label>
      <label><input type="checkbox" id="np-restart"> Restart</label>
      <label><input type="checkbox" id="np-fix"> Fix</label>
    </div>
    <div id="server-access-checks" style="margin-bottom:8px"></div>
  </div>

  <div class="card">
    <div class="card-title">Comptes existants</div>
    <div class="user-list" id="user-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('mc_token');
let currentUser = null;
let currentServerId = null;
let pollTimer = null;
let uploadedPlugins = [];
let allServers = [];

// ── Auth ──────────────────────────────────────────────────────
async function login() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const r = await fetch(`${API}/api/login`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    token = data.token; currentUser = data;
    localStorage.setItem('mc_token', token);
    showServers();
  } catch(e) { errEl.style.display='block'; errEl.textContent=e.message||'Erreur'; }
}

function logout() {
  localStorage.removeItem('mc_token');
  token=null; currentUser=null; currentServerId=null;
  clearInterval(pollTimer);
  hideAll();
  document.getElementById('login-screen').style.display='flex';
}

function hideAll() {
  ['login-screen','servers-screen','panel-screen','admin-screen'].forEach(id => {
    document.getElementById(id).style.display='none';
  });
}

// ── Écran serveurs ────────────────────────────────────────────
async function showServers() {
  clearInterval(pollTimer);
  currentServerId = null;
  uploadedPlugins = [];
  hideAll();
  document.getElementById('servers-screen').style.display='flex';

  const payload = JSON.parse(atob(token.split('.')[1]));
  currentUser = { username: payload.username, is_admin: payload.is_admin };
  document.getElementById('header-user-s').textContent = currentUser.username;
  document.getElementById('btn-admin-s').style.display = currentUser.is_admin ? 'inline-flex' : 'none';

  await loadServers();
  pollTimer = setInterval(loadServers, 5000);
}

async function loadServers() {
  try {
    const r = await fetch(`${API}/api/servers`, {headers:{Authorization:`Bearer ${token}`}});
    if (r.status===401) { logout(); return; }
    allServers = await r.json();
    renderServersGrid(allServers);
  } catch {}
}

function renderServersGrid(servers) {
  const grid = document.getElementById('servers-grid');
  if (!servers.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-family:\'Space Mono\',monospace;font-size:13px">Aucun serveur disponible.</div>';
    return;
  }
  grid.innerHTML = servers.map(s => {
    const state = s.state || {status:'stopped'};
    const statusLabels = {stopped:'Arrêté',starting:'Démarrage…',running:'En ligne',stopping:'Arrêt…',restarting:'Restart…',fixing:'Fix…'};
    return `
    <div class="server-card" onclick="openServer('${s.id}')">
      <div class="server-icon">${s.icon}</div>
      <div class="server-name">${s.name}</div>
      <div class="server-desc">${s.description}</div>
      <span class="server-badge ${state.status}">
        <span class="server-dot"></span>
        ${statusLabels[state.status]||state.status}
      </span>
    </div>`;
  }).join('');
}

// ── Panel serveur ─────────────────────────────────────────────
async function openServer(serverId) {
  clearInterval(pollTimer);
  currentServerId = serverId;
  uploadedPlugins = [];
  hideAll();
  document.getElementById('panel-screen').style.display='flex';
  document.getElementById('header-user-p').textContent = currentUser.username;
  document.getElementById('plugins-card').style.display = currentUser.is_admin ? 'block' : 'none';

  await updateStatus();
  pollTimer = setInterval(updateStatus, 4000);
}

const STATUS_MAP = {
  stopped:    {label:'Arrêté',        color:'var(--muted)', dot:''},
  starting:   {label:'Démarrage…',    color:'var(--amber)', dot:'starting'},
  running:    {label:'En ligne',       color:'var(--green)', dot:'running'},
  stopping:   {label:'Arrêt…',        color:'var(--red)',   dot:'stopping'},
  restarting: {label:'Restart…',      color:'var(--amber)', dot:'restarting'},
  fixing:     {label:'Fix en cours…', color:'var(--amber)', dot:'fixing'},
};

async function updateStatus() {
  try {
    const r = await fetch(`${API}/api/servers/${currentServerId}/status`, {headers:{Authorization:`Bearer ${token}`}});
    if (r.status===401) { logout(); return; }
    const data = await r.json();
    renderStatus(data);
    renderLogs(data.logs||[]);
    if (data.server) {
      document.getElementById('panel-server-name').textContent = `${data.server.icon} ${data.server.name}`;
      document.getElementById('server-info').innerHTML = `<div>Port&nbsp;<span>${data.server.port}</span></div><div>Jeu&nbsp;<span>Minecraft Java</span></div>`;
    }
  } catch {}
}

function renderStatus(data) {
  const s = STATUS_MAP[data.status]||STATUS_MAP.stopped;
  document.getElementById('status-dot').className=`status-dot ${s.dot}`;
  const lbl=document.getElementById('status-label');
  lbl.textContent=s.label; lbl.style.color=s.color;
  document.getElementById('status-meta').textContent=(data.requested_by&&data.status!=='stopped')?`par ${data.requested_by}`:'';
  const busy=!['stopped','running'].includes(data.status);
  document.getElementById('btn-start').disabled=data.status!=='stopped';
  document.getElementById('btn-stop').disabled=data.status!=='running';
  document.getElementById('btn-restart').disabled=data.status!=='running';
  document.getElementById('btn-fix').disabled=busy;
}

function renderLogs(logs) {
  if (!logs.length) return;
  const box=document.getElementById('console-box');
  box.innerHTML=logs.map(l=>{
    let cls='';
    if(/warn|warning/i.test(l)) cls='warn';
    else if(/error|exception|fatal/i.test(l)) cls='error';
    else if(/done|started|ready/i.test(l)) cls='info';
    return `<div class="console-line ${cls}">${l.replace(/</g,'&lt;')}</div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
}

async function serverAction(action) {
  try {
    const r=await fetch(`${API}/api/servers/${currentServerId}/${action}`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
    const data=await r.json();
    if (!r.ok) throw new Error(data.error);
    toast(data.message,'ok'); updateStatus();
  } catch(e) { toast(e.message,'err'); }
}

// ── Plugins ───────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if (file) uploadPlugin(file);
}

async function uploadPlugin(file) {
  if (!file) return;
  if (!file.name.endsWith('.jar')) { toast('Seuls les .jar !','err'); return; }
  toast(`Upload de ${file.name}…`,'ok');
  const formData=new FormData();
  formData.append('plugin',file);
  try {
    const r=await fetch(`${API}/api/servers/${currentServerId}/upload-plugin`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:formData});
    const data=await r.json();
    if (!r.ok) throw new Error(data.error);
    toast(data.message,'ok');
    uploadedPlugins.push({name:file.name,status:'pending'});
    renderPlugins();
  } catch(e) { toast(e.message,'err'); }
}

function renderPlugins() {
  const list=document.getElementById('plugin-list');
  list.innerHTML=uploadedPlugins.map(p=>`
    <div class="plugin-row">
      <span class="plugin-name">📦 ${p.name}</span>
      <span class="plugin-status ${p.status==='done'?'done':''}">${p.status==='done'?'✅ Installé':'⏳ En attente'}</span>
    </div>`).join('');
}

// ── Admin ─────────────────────────────────────────────────────
async function showAdmin() {
  clearInterval(pollTimer);
  hideAll();
  document.getElementById('admin-screen').style.display='flex';
  await loadAdminServers();
  await loadUsers();
}

async function loadAdminServers() {
  try {
    const r=await fetch(`${API}/api/admin/servers`,{headers:{Authorization:`Bearer ${token}`}});
    const servers=await r.json();
    allServers=servers;
    document.getElementById('server-access-checks').innerHTML=`
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Accès aux serveurs :</div>
      <div class="perm-row">${servers.map(s=>`<label><input type="checkbox" id="ns-${s.id}"> ${s.icon} ${s.name}</label>`).join('')}</div>`;
  } catch {}
}

async function loadUsers() {
  const r=await fetch(`${API}/api/admin/users`,{headers:{Authorization:`Bearer ${token}`}});
  const users=await r.json();
  document.getElementById('user-list').innerHTML=users.map(u=>{
    const p=u.permissions||{};
    const access=u.serverAccess||[];
    return `
    <div class="user-row">
      <div class="user-row-header">
        <div class="user-info">
          <span>${u.username}</span>
          ${u.is_admin?'<span class="badge admin">admin</span>':'<span class="badge">joueur</span>'}
        </div>
        <div class="user-actions">
          <button class="btn btn-muted btn-small" onclick="deleteUser(${u.id},'${u.username}')">Supprimer</button>
        </div>
      </div>
      ${!u.is_admin?`
      <div class="perm-panel" id="perm-panel-${u.id}">
        <label class="perm-toggle ${p.can_start?'active':''}"><input type="checkbox" ${p.can_start?'checked':''} onchange="this.closest('.perm-toggle').classList.toggle('active',this.checked)"> Démarrer</label>
        <label class="perm-toggle ${p.can_stop?'active':''}"><input type="checkbox" ${p.can_stop?'checked':''} onchange="this.closest('.perm-toggle').classList.toggle('active',this.checked)"> Arrêter</label>
        <label class="perm-toggle ${p.can_restart?'active':''}"><input type="checkbox" ${p.can_restart?'checked':''} onchange="this.closest('.perm-toggle').classList.toggle('active',this.checked)"> Restart</label>
        <label class="perm-toggle ${p.can_fix?'active':''}"><input type="checkbox" ${p.can_fix?'checked':''} onchange="this.closest('.perm-toggle').classList.toggle('active',this.checked)"> Fix</label>
        <div style="width:100%;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace">Serveurs :</span>
          ${allServers.map(s=>`<label class="perm-toggle ${access.includes(s.id)?'active':''}"><input type="checkbox" data-server="${s.id}" ${access.includes(s.id)?'checked':''} onchange="this.closest('.perm-toggle').classList.toggle('active',this.checked)"> ${s.icon} ${s.name}</label>`).join('')}
          <button class="btn btn-green btn-small perm-save-btn" onclick="savePerms(${u.id})">Sauvegarder</button>
        </div>
      </div>`:
      `<div class="perm-panel" style="color:var(--muted);font-family:'Space Mono',monospace;font-size:11px">Toutes les permissions (admin)</div>`}
    </div>`;
  }).join('');
}

async function savePerms(userId) {
  const panel=document.getElementById(`perm-panel-${userId}`);
  const boxes=panel.querySelectorAll('input[type="checkbox"]');
  const serverBoxes=panel.querySelectorAll('input[data-server]');
  const permissions={
    can_start:boxes[0].checked,
    can_stop:boxes[1].checked,
    can_restart:boxes[2].checked,
    can_fix:boxes[3].checked,
  };
  const serverAccess=[...serverBoxes].filter(b=>b.checked).map(b=>b.dataset.server);
  try {
    const r=await fetch(`${API}/api/admin/users/${userId}/permissions`,{method:'PATCH',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({permissions,serverAccess})});
    const data=await r.json();
    if (!r.ok) throw new Error(data.error);
    toast('Permissions sauvegardées !','ok');
  } catch(e) { toast(e.message,'err'); }
}

async function createUser() {
  const username=document.getElementById('new-user').value.trim();
  const password=document.getElementById('new-pass').value;
  const is_admin=document.getElementById('np-admin').checked;
  const permissions={
    can_start:document.getElementById('np-start').checked,
    can_stop:document.getElementById('np-stop').checked,
    can_restart:document.getElementById('np-restart').checked,
    can_fix:document.getElementById('np-fix').checked,
  };
  const serverAccess=allServers.filter(s=>document.getElementById(`ns-${s.id}`)?.checked).map(s=>s.id);
  if (!username||!password) { toast('Remplis tous les champs','err'); return; }
  const r=await fetch(`${API}/api/admin/create-user`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({username,password,is_admin,permissions,serverAccess})});
  const data=await r.json();
  if (!r.ok) { toast(data.error,'err'); return; }
  toast(data.message,'ok');
  document.getElementById('new-user').value='';
  document.getElementById('new-pass').value='';
  loadUsers();
}

async function deleteUser(id,name) {
  if (!confirm(`Supprimer "${name}" ?`)) return;
  await fetch(`${API}/api/admin/users/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
  toast(`"${name}" supprimé`,'ok'); loadUsers();
}

let toastTimer;
function toast(msg,type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',3000);
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
if (token) showServers(); else document.getElementById('login-screen').style.display='flex';
</script>
