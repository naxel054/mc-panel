<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c0f;--bg2:#111418;--bg3:#181c22;--border:#252a32;
    --green:#22c55e;--green-dim:#15803d;--red:#ef4444;--amber:#f59e0b;
    --blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:100}
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 44px 40px;width:360px;position:relative;overflow:hidden}
  .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
  .login-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
  .login-logo span{color:var(--green)}
  .login-sub{color:var(--muted);font-size:13px;font-family:'Space Mono',monospace;margin-bottom:36px}
  label{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  input[type="text"],input[type="password"]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;margin-bottom:20px}
  input:focus{border-color:var(--green)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:11px 22px;transition:opacity .15s,transform .1s;letter-spacing:.03em}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-full{width:100%}
  .btn-green{background:var(--green);color:#fff}
  .btn-red{background:var(--red);color:#fff}
  .btn-amber{background:var(--amber);color:#000}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-muted{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
  .btn-small{padding:6px 14px;font-size:13px}
  .error-msg{color:var(--red);font-size:13px;font-family:'Space Mono',monospace;margin-top:-12px;margin-bottom:16px;display:none}
  #app-screen{display:none;flex-direction:column;width:100%;max-width:900px;padding:32px 24px;gap:24px}
  .app-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .app-logo{font-size:22px;font-weight:800;letter-spacing:-1px}
  .app-logo span{color:var(--green)}
  .user-badge{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);font-family:'Space Mono',monospace}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
  .status-row{display:flex;align-items:center;gap:20px;margin-bottom:28px}
  .status-dot{width:14px;height:14px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .4s}
  .status-dot.running{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
  .status-dot.starting,.status-dot.restarting,.status-dot.fixing{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:pulse 1s infinite}
  .status-dot.stopping{background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .status-label{font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .status-meta{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:2px}
  .server-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);margin-bottom:24px;display:flex;gap:24px;flex-wrap:wrap}
  .server-info span{color:var(--text)}
  .action-row{display:flex;gap:10px;flex-wrap:wrap}
  /* Console */
  .console-box{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:'Space Mono',monospace;font-size:12px;color:#a0aec0;height:280px;overflow-y:auto;line-height:1.6}
  .console-line{padding:1px 0}
  .console-line.warn{color:var(--amber)}
  .console-line.error{color:var(--red)}
  .console-line.info{color:var(--green)}
  /* Admin */
  .user-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
  .user-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-family:'Space Mono',monospace;font-size:13px}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:4px;background:var(--green-dim);color:var(--green);margin-left:10px}
  .badge.admin{background:rgba(59,130,246,.2);color:var(--blue)}
  .create-form{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end;margin-top:20px}
  .create-form input{margin-bottom:0}
  .field{display:flex;flex-direction:column;gap:6px}
  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 22px;font-family:'Space Mono',monospace;font-size:13px;transition:transform .3s ease;z-index:200}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.ok{border-color:var(--green);color:var(--green)}
  #toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">MC<span>Panel</span></div>
    <div class="login-sub">// accès restreint</div>
    <label>Nom d'utilisateur</label>
    <input type="text" id="login-user" placeholder="username">
    <label>Mot de passe</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <div class="error-msg" id="login-error">Identifiants incorrects.</div>
    <button class="btn btn-green btn-full" onclick="login()">Connexion</button>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div class="app-logo">MC<span>Panel</span></div>
    <div class="user-badge">
      <span id="header-user"></span>
      <button class="btn btn-muted btn-small" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- Statut -->
  <div class="card">
    <div class="card-title">Statut du serveur</div>
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <div>
        <div class="status-label" id="status-label">Chargement…</div>
        <div class="status-meta" id="status-meta"></div>
      </div>
    </div>
    <div class="server-info">
      <div>Port&nbsp;<span>50000</span></div>
      <div>Jeu&nbsp;<span>Minecraft Java</span></div>
    </div>
    <div class="action-row">
      <button class="btn btn-green"  id="btn-start"   onclick="serverAction('start')"   disabled>▶ Démarrer</button>
      <button class="btn btn-red"    id="btn-stop"    onclick="serverAction('stop')"    disabled>■ Arrêter</button>
      <button class="btn btn-blue"   id="btn-restart" onclick="serverAction('restart')" disabled>↺ Restart</button>
      <button class="btn btn-amber"  id="btn-fix"     onclick="serverAction('fix')"              >🔧 Fix</button>
    </div>
  </div>

  <!-- Console -->
  <div class="card">
    <div class="card-title">Console</div>
    <div class="console-box" id="console-box">
      <div class="console-line info">// En attente des logs...</div>
    </div>
  </div>

  <!-- Admin -->
  <div class="card" id="admin-card" style="display:none">
    <div class="card-title">Gestion des comptes</div>
    <div class="create-form">
      <div class="field"><label>Nom</label><input type="text" id="new-user" placeholder="joueur123"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="new-pass" placeholder="••••••"></div>
      <div class="field"><label>Admin?</label><input type="checkbox" id="new-admin" style="width:18px;height:18px;margin-top:10px;accent-color:var(--green)"></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-green btn-small" onclick="createUser()">+ Créer</button></div>
    </div>
    <div style="margin-top:8px" class="card-title">Comptes</div>
    <div class="user-list" id="user-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('mc_token');
let currentUser = null;
let pollTimer = null;

async function login() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const r = await fetch(`${API}/api/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password}) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    token = data.token;
    currentUser = data;
    localStorage.setItem('mc_token', token);
    showApp();
  } catch(e) {
    errEl.style.display = 'block';
    errEl.textContent = e.message || 'Erreur';
  }
}

function logout() {
  localStorage.removeItem('mc_token');
  token = null; currentUser = null;
  clearInterval(pollTimer);
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function showApp() {
  try {
    const r = await fetch(`${API}/api/status`, { headers:{ Authorization:`Bearer ${token}` } });
    if (!r.ok) { logout(); return; }
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUser = { username: payload.username, is_admin: payload.is_admin };
  } catch { logout(); return; }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('header-user').textContent = currentUser.username;

  if (currentUser.is_admin) {
    document.getElementById('admin-card').style.display = 'block';
    loadUsers();
  }

  updateStatus();
  pollTimer = setInterval(updateStatus, 4000);
}

const STATUS_MAP = {
  stopped:    { label:'Arrêté',          color:'var(--muted)',  dot:'' },
  starting:   { label:'Démarrage…',      color:'var(--amber)',  dot:'starting' },
  running:    { label:'En ligne',         color:'var(--green)',  dot:'running' },
  stopping:   { label:'Arrêt…',          color:'var(--red)',    dot:'stopping' },
  restarting: { label:'Restart…',        color:'var(--amber)',  dot:'restarting' },
  fixing:     { label:'Fix en cours…',   color:'var(--amber)',  dot:'fixing' },
};

async function updateStatus() {
  try {
    const r = await fetch(`${API}/api/status`, { headers:{ Authorization:`Bearer ${token}` } });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    renderStatus(data);
    renderLogs(data.logs || []);
  } catch {}
}

function renderStatus(data) {
  const s = STATUS_MAP[data.status] || STATUS_MAP.stopped;
  document.getElementById('status-dot').className = `status-dot ${s.dot}`;
  const lbl = document.getElementById('status-label');
  lbl.textContent = s.label;
  lbl.style.color = s.color;
  const meta = document.getElementById('status-meta');
  if (data.requested_by && data.status !== 'stopped')
    meta.textContent = `par ${data.requested_by}`;
  else meta.textContent = '';

  const busy = !['stopped','running'].includes(data.status);
  document.getElementById('btn-start').disabled   = data.status !== 'stopped';
  document.getElementById('btn-stop').disabled    = data.status !== 'running';
  document.getElementById('btn-restart').disabled = data.status !== 'running';
  document.getElementById('btn-fix').disabled     = busy;
}

function renderLogs(logs) {
  const box = document.getElementById('console-box');
  if (!logs.length) return;
  box.innerHTML = logs.map(l => {
    let cls = '';
    if (/warn|warning/i.test(l)) cls = 'warn';
    else if (/error|exception|fatal/i.test(l)) cls = 'error';
    else if (/done|started|ready/i.test(l)) cls = 'info';
    return `<div class="console-line ${cls}">${l.replace(/</g,'&lt;')}</div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

async function serverAction(action) {
  try {
    const r = await fetch(`${API}/api/${action}`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    toast(data.message, 'ok');
    updateStatus();
  } catch(e) { toast(e.message, 'err'); }
}

async function loadUsers() {
  const r = await fetch(`${API}/api/admin/users`, { headers:{ Authorization:`Bearer ${token}` } });
  const users = await r.json();
  document.getElementById('user-list').innerHTML = users.map(u => `
    <div class="user-row">
      <span>${u.username}${u.is_admin ? '<span class="badge admin">admin</span>' : '<span class="badge">joueur</span>'}</span>
      <button class="btn btn-muted btn-small" onclick="deleteUser(${u.id},'${u.username}')">Supprimer</button>
    </div>`).join('');
}

async function createUser() {
  const username = document.getElementById('new-user').value.trim();
  const password = document.getElementById('new-pass').value;
  const is_admin = document.getElementById('new-admin').checked;
  if (!username || !password) { toast('Remplis tous les champs','err'); return; }
  const r = await fetch(`${API}/api/admin/create-user`, { method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, body: JSON.stringify({username,password,is_admin}) });
  const data = await r.json();
  if (!r.ok) { toast(data.error,'err'); return; }
  toast(data.message,'ok');
  document.getElementById('new-user').value = '';
  document.getElementById('new-pass').value = '';
  loadUsers();
}

async function deleteUser(id, name) {
  if (!confirm(`Supprimer "${name}" ?`)) return;
  await fetch(`${API}/api/admin/users/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
  toast(`"${name}" supprimé`,'ok');
  loadUsers();
}

let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
if (token) showApp();
</script>
</body>
</html>
